# v* 태그 푸시 시에만 실행 — Windows 설치파일 빌드 후 GitHub Release 업로드
name: Release

on:
  push:
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # 검증: 태그 버전이 package.json 버전보다 낮으면 실패 (실수로 과거 버전 태그 방지)
      - name: Validate tag version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CUR=$(node -p "require('./package.json').version")
          HIGHEST=$(printf '%s\n%s\n' "$CUR" "$TAG" | sort -V | tail -1)
          if [ "$HIGHEST" != "$TAG" ]; then
            echo "::error::태그 버전($TAG)이 package.json($CUR)보다 낮습니다"
            exit 1
          fi

      # 태그를 package.json 버전에 반영 — 설치파일 버전이 항상 태그를 따라감
      # (이미 같으면 skip — npm version 은 동일 버전이면 에러로 죽음)
      - name: Sync version from tag
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CUR=$(node -p "require('./package.json').version")
          if [ "$CUR" != "$TAG" ]; then
            npm version --no-git-tag-version "$TAG"
          fi

      - name: Build installer
        # 업로드는 아래 gh-release 단계가 담당 — electron-builder 자체 publish 는 끔
        run: npm run dist -- --publish never
        env:
          # 코드 서명 인증서 없음 — 서명 시도 비활성화
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # 커밋 기반 릴리스 노트 자동 생성 — 트레이 "변경사항 보기"에서 열람
          generate_release_notes: true
          # latest.yml + blockmap 은 electron-updater 자동 업데이트에 필요
          files: |
            release/*.exe
            release/*.blockmap
            release/latest.yml

      # 릴리스 성공 후 master 의 package.json 버전을 태그에 맞춰 자동 커밋
      # (태그만 만들고 버전 범프를 잊어도 리포가 어긋나지 않게)
      - name: Bump version on master
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          git fetch origin master
          # -f: Sync 스텝이 작업 트리에 남긴 package.json 수정을 버리고 master 원본을 읽음
          git checkout -f -B master origin/master
          CUR=$(node -p "require('./package.json').version")
          if [ "$CUR" != "$TAG" ]; then
            npm version --no-git-tag-version "$TAG"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -am "chore: bump version to $TAG [skip ci]"
            git push origin master
          fi
