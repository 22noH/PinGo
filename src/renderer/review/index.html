<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; script-src 'self' https://cdn.jsdelivr.net;">
  <title>Pingo 리뷰</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/components.css">
  <link rel="stylesheet" href="../shared/components-v2.css">
  <link rel="stylesheet" href="../shared/markdown.css">
  <link rel="stylesheet" href="../shared/diff.css">
  <link rel="stylesheet" href="./review.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js" defer></script>
</head>
<body>
  <!-- 타이틀바 오버레이 + 탭 스트립 -->
  <div class="review-tabstrip-wrap">
    <svg class="review-titlebar-icon" width="26" height="26" viewBox="0 0 24 24" aria-hidden="true">
      <ellipse cx="12" cy="15" rx="7" ry="8" fill="#89b4fa"/>
      <ellipse cx="12" cy="16" rx="4.2" ry="5.5" fill="#e6e9ef"/>
      <ellipse cx="5.5" cy="15.5" rx="2" ry="4.5" fill="#74c7ec" transform="rotate(-12 5.5 15.5)"/>
      <ellipse cx="18.5" cy="15.5" rx="2" ry="4.5" fill="#74c7ec" transform="rotate(12 18.5 15.5)"/>
      <circle cx="9.5" cy="11.2" r="1.7" fill="white"/>
      <circle cx="14.5" cy="11.2" r="1.7" fill="white"/>
      <circle cx="9.9" cy="11.4" r="0.85" fill="#11111b"/>
      <circle cx="14.9" cy="11.4" r="0.85" fill="#11111b"/>
      <circle cx="10.2" cy="11.0" r="0.28" fill="white"/>
      <circle cx="15.2" cy="11.0" r="0.28" fill="white"/>
      <ellipse cx="12" cy="13.4" rx="1.8" ry="1.1" fill="#f9a825"/>
    </svg>
    <div id="review-tabstrip" class="review-tabstrip"></div>
  </div>

  <main class="review-root">
    <!-- ── MR 헤더 ───────────────────────────────────── -->
    <header class="review-header">
      <div class="col" style="gap: var(--space-1);">
        <div class="row" style="gap: var(--space-2);">
          <span class="text-accent text-mono" id="mr-iid">MR #—</span>
          <span class="text-muted">·</span>
          <span class="truncate" id="mr-title">로딩 중…</span>
        </div>
        <div class="row text-secondary" style="font-size: var(--fs-sm); gap: var(--space-3);">
          <span id="mr-branch" class="text-mono">— → —</span>
          <span class="text-muted">·</span>
          <span id="mr-author">—</span>
          <span class="text-muted">·</span>
          <a id="mr-link" class="text-accent" href="#" rel="noopener">GitLab에서 열기</a>
        </div>
      </div>
      <div class="row shrink0" style="gap: var(--space-2);">
        <span id="review-state-badge" class="badge badge-muted">대기</span>
      </div>
    </header>

    <!-- ── 본문 2단 ──────────────────────────────────── -->
    <section class="review-split">
      <!-- 좌측: 파일 목록 -->
      <aside class="review-files card">
        <header class="card-header">
          <h2 style="font-size: var(--fs-md); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;">
            언급된 파일
          </h2>
          <span id="file-count" class="badge badge-muted">0</span>
        </header>
        <div class="card-body" style="padding: 0;">
          <ul id="file-list" class="file-list">
            <li class="file-empty text-muted">
              리뷰가 시작되면 여기에 파일이 표시됩니다.
            </li>
          </ul>
        </div>
      </aside>

      <!-- 우측: AI 리뷰 패널 -->
      <section class="review-panel card">
        <header class="card-header">
          <h2 style="font-size: var(--fs-md); color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600;">
            AI 리뷰
          </h2>
          <button id="btn-scroll-bottom" class="btn btn-ghost btn-sm" type="button" hidden>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
            최신으로
          </button>
        </header>
        <div id="review-scroll" class="card-body stream-scroll">
          <div id="review-idle" class="review-idle">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" opacity="0.5">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
            </svg>
            <p>아래 <strong>리뷰 시작</strong>을 눌러 코드 리뷰를 요청하세요.</p>
          </div>
          <article id="review-markdown" class="markdown" hidden></article>
          <div id="review-error" class="review-error" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <div>
              <div class="review-error-title">리뷰 실패</div>
              <div class="review-error-message" id="review-error-message"></div>
            </div>
          </div>
        </div>
      </section>
    </section>

    <!-- ── 푸터 버튼 ─────────────────────────────────── -->
    <footer class="review-footer">
      <button id="btn-abort" class="btn btn-secondary" type="button" hidden>
        중단
      </button>
      <span class="sep"></span>
      <button id="btn-retry" class="btn btn-secondary" type="button" hidden>다시 시도</button>
      <button id="btn-comment" class="btn btn-secondary" type="button" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
        GitLab 댓글 등록
      </button>
      <button id="btn-review" class="btn btn-primary" type="button" disabled>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        리뷰 시작
      </button>
    </footer>
  </main>

  <script type="module" src="./review.js"></script>
</body>
</html>
