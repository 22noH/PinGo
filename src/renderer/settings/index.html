<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; script-src 'self';">
  <title>Pingo 설정</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/components.css">
  <link rel="stylesheet" href="../shared/components-v2.css">
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <!-- 타이틀바 드래그 영역 (42px — titleBarOverlay 높이 맞춤) -->
  <div class="settings-titlebar">
    <!-- 펭귄 아이콘 -->
    <svg width="30" height="30" viewBox="0 0 32 32" aria-hidden="true" style="-webkit-app-region:no-drag;">
      <path d="M16 7 C22 7 27 11 27 17 C27 20 30 20 30 22 C30 24 27 24 25 23 C24 24 22 27 16 27 C10 27 8 24 7 23 C5 24 2 24 2 22 C2 20 5 20 5 17 C5 11 10 7 16 7 Z" fill="#f5f0e5"/>
      <ellipse cx="15" cy="14" rx="4" ry="3" fill="white" opacity="0.55"/>
      <circle cx="13" cy="15" r="2.4" fill="#231f2e"/>
      <circle cx="19" cy="15" r="2.4" fill="#231f2e"/>
      <circle cx="13.9" cy="14.1" r="0.85" fill="white"/>
      <circle cx="19.9" cy="14.1" r="0.85" fill="white"/>
    </svg>
    <span class="settings-titlebar-text" style="-webkit-app-region:no-drag;">Pingo 설정</span>
  </div>

  <main class="settings-root">
    <!-- ── 헤더 ─────────────────────────────────────────── -->
    <header class="settings-header">
      <p class="settings-subtitle">Git 연결 · AI Provider · 폴링 / 알림</p>
    </header>

    <!-- ── 탭 바 ────────────────────────────────────────── -->
    <nav class="tab-bar" role="tablist" aria-label="설정 섹션">
      <button id="tab-git" type="button" role="tab" aria-controls="panel-git" aria-selected="true" class="tab-item is-active">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
        Git 연결
      </button>
      <button id="tab-ai" type="button" role="tab" aria-controls="panel-ai" aria-selected="false" class="tab-item">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="12 2 2 7 12 12 22 7 12 2"/>
          <polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/>
        </svg>
        AI
      </button>
    </nav>

    <!-- ── 탭 패널 ──────────────────────────────────────── -->
    <section class="settings-body">
      <!-- [Git 연결] -->
      <div id="panel-git" role="tabpanel" aria-labelledby="tab-git" class="tab-panel is-active">
        <div class="field">
          <div class="row" style="justify-content: space-between;">
            <span class="field-label">연결된 서비스</span>
            <button id="btn-add-connection" type="button" class="btn btn-secondary btn-sm">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              서비스 추가
            </button>
          </div>
          <ul id="connection-list" class="connection-list" aria-live="polite"></ul>
          <div id="connection-empty" class="connection-empty" hidden>
            아직 등록된 Git 연결이 없습니다. "서비스 추가" 버튼으로 GitLab 또는 GitHub를 연결하세요.
          </div>
        </div>

        <!-- 인라인 편집 폼 (추가/편집 시 동적 렌더) -->
        <div id="git-form-host" hidden></div>
      </div>

      <!-- [AI] -->
      <div id="panel-ai" role="tabpanel" aria-labelledby="tab-ai" class="tab-panel" hidden>
        <div class="field">
          <label class="field-label" for="ai-provider">AI 제공자</label>
          <select id="ai-provider" class="select">
            <option value="claude-cli">Claude CLI</option>
            <option value="codex-cli">Codex CLI</option>
            <option value="anthropic-api">Anthropic API</option>
            <option value="openai-api">OpenAI API</option>
            <option value="ollama">Ollama (로컬)</option>
          </select>
          <span class="field-hint">리뷰 생성에 사용할 AI. CLI가 빠르고 API는 원격 요금 발생.</span>
        </div>

        <div id="ai-fields" class="col" style="gap: var(--space-5);"></div>

        <div class="field">
          <div class="row" style="gap: var(--space-3);">
            <button id="btn-ai-test" type="button" class="btn btn-secondary">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
              <span id="ai-test-label">가용성 확인</span>
            </button>
            <span id="ai-test-result" class="status-line" hidden></span>
          </div>
        </div>
      </div>
    </section>

    <!-- ── 공통 하단 (폴링/알림) ────────────────────────── -->
    <section class="settings-common">
      <div class="field">
        <label class="field-label" for="poll-interval">
          폴링 간격 <span class="text-accent text-mono" id="poll-value">30s</span>
        </label>
        <input id="poll-interval" class="slider" type="range" min="10" max="300" step="5" value="30">
        <span class="field-hint">10초 ~ 5분</span>
      </div>

      <div class="field">
        <label class="checkbox-row">
          <input id="notification-enabled" type="checkbox" checked>
          <span class="checkbox-label">알림 활성화 (토스트 표시)</span>
        </label>
      </div>

      <div class="field">
        <label class="checkbox-row">
          <input id="comment-notifications-enabled" type="checkbox" checked>
          <span class="checkbox-label">멘션 알림</span>
        </label>
        <span class="field-hint">MR/PR 댓글에 내가 @멘션되면 알림.</span>
      </div>

      <div class="field">
        <label class="checkbox-row">
          <input id="launch-on-startup" type="checkbox">
          <span class="checkbox-label">Windows 시작 시 자동 실행</span>
        </label>
        <span class="field-hint">로그인하면 Pingo가 트레이에 자동으로 시작됩니다.</span>
      </div>
    </section>

    <footer class="settings-footer">
      <button id="btn-cancel" class="btn btn-ghost" type="button">취소</button>
      <button id="btn-save"   class="btn btn-primary" type="button">저장</button>
    </footer>
  </main>

  <script type="module" src="./settings.js"></script>
</body>
</html>
