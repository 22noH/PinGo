<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; script-src 'self';">
  <title>Pingo 설정</title>
  <link rel="stylesheet" href="../shared/tokens.css">
  <link rel="stylesheet" href="../shared/components.css">
  <link rel="stylesheet" href="./settings.css">
</head>
<body>
  <main class="settings-root">
    <header class="settings-header">
      <div class="row" style="gap: var(--space-3);">
        <svg class="settings-logo" width="22" height="22" viewBox="0 0 16 16" aria-hidden="true">
          <circle cx="8" cy="8" r="7.5" fill="#89b4fa" stroke="#1e66f5" stroke-width="0.5"/>
          <path d="M8 3.5 L11.5 10 L8 8.5 L4.5 10 Z" fill="#1a1b2e"/>
          <path d="M4.5 10 L8 12.5 L11.5 10 L8 8.5 Z" fill="#1a1b2e" opacity="0.7"/>
        </svg>
        <h1 class="settings-title">Pingo 설정</h1>
      </div>
      <p class="settings-subtitle">GitLab 연동 및 폴링 설정</p>
    </header>

    <section class="settings-body col">
      <!-- GitLab URL -->
      <div class="field">
        <label class="field-label" for="gitlab-url">GitLab URL</label>
        <input id="gitlab-url" class="input" type="url"
               placeholder="https://gitlab.example.com" autocomplete="off" spellcheck="false">
        <span class="field-hint">Self-hosted GitLab 인스턴스 URL (끝에 슬래시 없이)</span>
        <span class="field-error" id="err-gitlab-url" hidden></span>
      </div>

      <!-- Token -->
      <div class="field">
        <label class="field-label" for="token">Personal Access Token</label>
        <div class="input-group">
          <input id="token" class="input" type="password"
                 placeholder="glpat-xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
          <button type="button" id="toggle-token" class="input-icon-btn"
                  aria-label="토큰 표시 전환" title="표시/숨김">
            <svg id="icon-eye" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            <svg id="icon-eye-off" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" hidden>
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
        <span class="field-hint">scope: api, read_user</span>
        <span class="field-error" id="err-token" hidden></span>
      </div>

      <!-- User ID -->
      <div class="field">
        <label class="field-label" for="user-id">User ID</label>
        <input id="user-id" class="input" type="number" min="1" placeholder="123" autocomplete="off">
        <span class="field-hint">GitLab 프로필 → Edit profile → ID (또는 연결 테스트로 자동 탐지)</span>
        <span class="field-error" id="err-user-id" hidden></span>
      </div>

      <!-- Poll interval -->
      <div class="field">
        <label class="field-label" for="poll-interval">
          폴링 간격 <span class="text-accent text-mono" id="poll-value">30s</span>
        </label>
        <input id="poll-interval" class="slider" type="range" min="10" max="300" step="5" value="30">
        <span class="field-hint">10초 ~ 5분</span>
      </div>

      <!-- Notification enabled -->
      <div class="field">
        <label class="checkbox-row">
          <input id="notification-enabled" type="checkbox" checked>
          <span class="checkbox-label">알림 활성화 (토스트 표시)</span>
        </label>
      </div>

      <!-- Connection test -->
      <div class="field">
        <div class="row" style="gap: var(--space-3);">
          <button id="btn-test" class="btn btn-secondary" type="button">
            <span id="test-icon">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
              </svg>
            </span>
            <span>연결 테스트</span>
          </button>
          <span id="test-result" class="status-line" hidden></span>
        </div>
      </div>
    </section>

    <footer class="settings-footer">
      <button id="btn-cancel" class="btn btn-ghost" type="button">취소</button>
      <button id="btn-save"   class="btn btn-primary" type="button" disabled>저장</button>
    </footer>
  </main>

  <script type="module" src="./settings.js"></script>
</body>
</html>
