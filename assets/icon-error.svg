<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- body (desaturated) -->
  <ellipse cx="16" cy="22" rx="10" ry="8" fill="#7287a8"/>
  <!-- belly -->
  <ellipse cx="16" cy="23" rx="7" ry="7" fill="#c0c8d8"/>
