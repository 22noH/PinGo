<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- body -->
  <ellipse cx="16" cy="21" rx="8.5" ry="10" fill="#313244"/>
  <!-- belly -->
  <ellipse cx="16" cy="22.5" rx="5" ry="6.5" fill="#cdd6f4" opacity="0.5"/>
  <!-- head -->
  <ellipse cx="16" cy="9.5" rx="6.5" ry="7" fill="#313244"/>
  <!-- face -->
  <ellipse cx="16" cy="10.5" rx="4" ry="3.5" fill="#cdd6f4" opacity="0.5"/>
  <!-- eyes: sad -->
  <circle cx="14" cy="9" r="1.1" fill="#6c7a96"/>
  <circle cx="18" cy="9" r="1.1" fill="#6c7a96"/>
  <!-- beak -->
  <ellipse cx="16" cy="13" rx="1.6" ry="1.1" fill="#6c7a96"/>
  <!-- wings -->
  <ellipse cx="8.5" cy="21" rx="2.2" ry="6" fill="#313244" transform="rotate(-10 8.5 21)"/>
  <ellipse cx="23.5" cy="21" rx="2.2" ry="6" fill="#313244" transform="rotate(10 23.5 21)"/>
  <!-- feet -->
  <ellipse cx="12.5" cy="30.5" rx="2.8" ry="1.1" fill="#6c7a96"/>
  <ellipse cx="19.5" cy="30.5" rx="2.8" ry="1.1" fill="#6c7a96"/>
  <!-- status: grey/dark dot (error) -->
  <circle cx="26" cy="6" r="5" fill="#45475a" stroke="#313244" stroke-width="0.8"/>
  <line x1="23.5" y1="3.5" x2="28.5" y2="8.5" stroke="#cdd6f4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28.5" y1="3.5" x2="23.5" y2="8.5" stroke="#cdd6f4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
