  <line x1="11.2" y1="7.5" x2="14.8" y2="8.3" stroke="#6c7a8f" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="17.2" y1="8.3" x2="20.8" y2="7.5" stroke="#6c7a8f" stroke-width="1.2" stroke-linecap="round"/>
  <!-- beak (desaturated) -->
  <ellipse cx="16" cy="15.5" rx="1.5" ry="1" fill="#8a96aa"/>
  <!-- feet (desaturated) -->
  <ellipse cx="12.5" cy="30.5" rx="2.5" ry="1" fill="#8a96aa"/>
  <ellipse cx="19.5" cy="30.5" rx="2.5" ry="1" fill="#8a96aa"/>
  <!-- status: error X dot -->
  <circle cx="27" cy="5" r="5" fill="#45475a" stroke="#313244" stroke-width="0.8"/>
  <line x1="24.5" y1="2.5" x2="29.5" y2="7.5" stroke="#cdd6f4" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="29.5" y1="2.5" x2="24.5" y2="7.5" stroke="#cdd6f4" stroke-width="1.5" stroke-linecap="round"/>
</svg>
