  <circle cx="16" cy="10" r="7" fill="#7287a8"/>
  <!-- face patch -->
  <ellipse cx="16" cy="12" rx="5.5" ry="4.8" fill="#c0c8d8"/>
  <!-- eyes: sad -->
  <circle cx="13" cy="10" r="2.2" fill="#8a96aa"/>
