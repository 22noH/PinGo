<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- body (chubby round) -->
  <ellipse cx="16" cy="22" rx="9" ry="7" fill="#89b4fa"/>
  <!-- belly -->
  <ellipse cx="16" cy="23" rx="6" ry="6" fill="#e6e9ef"/>
  <!-- head -->
  <circle cx="16" cy="11" r="9" fill="#89b4fa"/>
  <!-- face patch (wide, baby penguin style) -->
  <ellipse cx="16" cy="13" rx="6.5" ry="5.8" fill="#e6e9ef"/>
  <!-- eyes (large dark orbs, like real baby penguin) -->
  <circle cx="12.5" cy="11.5" r="2.8" fill="#11111b"/>
  <circle cx="19.5" cy="11.5" r="2.8" fill="#11111b"/>
  <!-- eye shine -->
  <circle cx="13.5" cy="10.5" r="1" fill="white"/>
  <circle cx="20.5" cy="10.5" r="1" fill="white"/>
  <!-- beak (small) -->
  <ellipse cx="16" cy="17" rx="1.8" ry="1.2" fill="#f9a825"/>
  <!-- feet -->
  <ellipse cx="12.5" cy="30" rx="2.6" ry="1.1" fill="#f9a825"/>
  <ellipse cx="19.5" cy="30" rx="2.6" ry="1.1" fill="#f9a825"/>
  <!-- status: green dot -->
  <circle cx="27" cy="5" r="5" fill="#a6e3a1" stroke="#40a02b" stroke-width="0.8"/>
</svg>
