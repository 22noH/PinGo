<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- body -->
  <ellipse cx="16" cy="23" rx="8" ry="7" fill="#89b4fa"/>
  <!-- belly -->
  <ellipse cx="16" cy="24" rx="5" ry="5.2" fill="#e6e9ef"/>
  <!-- left wing (drooping) -->
  <ellipse cx="7" cy="23.5" rx="3" ry="4" fill="#74c7ec" transform="rotate(-15 7 23.5)"/>
  <ellipse cx="7.2" cy="22.5" rx="1.1" ry="1.8" fill="#99d8f5" opacity="0.55" transform="rotate(-15 7.2 22.5)"/>
  <!-- right wing (drooping) -->
  <ellipse cx="25" cy="23.5" rx="3" ry="4" fill="#74c7ec" transform="rotate(15 25 23.5)"/>
  <ellipse cx="24.8" cy="22.5" rx="1.1" ry="1.8" fill="#99d8f5" opacity="0.55" transform="rotate(15 24.8 22.5)"/>
  <!-- head -->
  <circle cx="16" cy="12" r="9" fill="#89b4fa"/>
  <!-- face patch -->
  <ellipse cx="16" cy="13.5" rx="5.8" ry="4.8" fill="#e6e9ef"/>
  <!-- eyes: X -->
  <line x1="11" y1="9.5" x2="14.5" y2="13" stroke="#f38ba8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="14.5" y1="9.5" x2="11" y2="13" stroke="#f38ba8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="17.5" y1="9.5" x2="21" y2="13" stroke="#f38ba8" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="21" y1="9.5" x2="17.5" y2="13" stroke="#f38ba8" stroke-width="1.4" stroke-linecap="round"/>
  <!-- beak -->
  <ellipse cx="16" cy="17" rx="2" ry="1.4" fill="#f9a825"/>
  <!-- feet -->
  <ellipse cx="12.5" cy="29.5" rx="2.6" ry="1.1" fill="#f9a825"/>
  <ellipse cx="19.5" cy="29.5" rx="2.6" ry="1.1" fill="#f9a825"/>
  <!-- status: red dot -->
  <circle cx="27" cy="5" r="5" fill="#f38ba8" stroke="#e64553" stroke-width="0.8"/>
</svg>
